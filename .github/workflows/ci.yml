name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore
        run: dotnet restore src/LeXtudio.Windows/LeXtudio.Windows.csproj
      - name: Build
        run: dotnet build src/LeXtudio.Windows/LeXtudio.Windows.csproj -c Release
