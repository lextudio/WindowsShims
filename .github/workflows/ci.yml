name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            solution: src/WindowsShims.slnx
          - os: macos-latest
            solution: src/WindowsShims.slnx
          - os: windows-latest
            solution: src/WindowsShims.slnx
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: ./build.windows.bat Release
      - name: Build (macOS/Linux)
        if: runner.os != 'Windows'
        run: dotnet build -c Release ${{ matrix.solution }}
      - name: Run unit tests
        run: dotnet test --no-build -c Release --verbosity minimal ${{ matrix.solution }}